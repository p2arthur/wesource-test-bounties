services:
  db:
    image: postgres:16-alpine
    container_name: wesource_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wesource_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d wesource_db']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wesource_api
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: 'postgresql://user:password@db:5432/wesource_db?schema=public'
      # Algorand configuration (TestNet via Algonode)
      ALGOD_SERVER: ${ALGOD_SERVER:-https://testnet-api.algonode.cloud}
      ALGOD_PORT: ${ALGOD_PORT:-}
      ALGOD_TOKEN: ${ALGOD_TOKEN:-}
      SOURCE_FACTORY_APP_ID: ${SOURCE_FACTORY_APP_ID:-755043090}
      MANAGER_MNEMONIC: ${MANAGER_MNEMONIC:-}
      # Indexer configuration (TestNet via Algonode)
      INDEXER_SERVER: ${INDEXER_SERVER:-https://testnet-idx.algonode.cloud}
      INDEXER_PORT: ${INDEXER_PORT:-}
      INDEXER_TOKEN: ${INDEXER_TOKEN:-}
      # GitHub configuration
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - ./:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      db:
        condition: service_healthy

# --- THIS IS THE PART YOU WERE MISSING ---
volumes:
  postgres_data:
